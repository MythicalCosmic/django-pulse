<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telescope</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'telescope/assets/style.css' %}">
</head>
<body>
    <div id="app"></div>
    <script>
        window.__TELESCOPE_CONFIG__ = {
            basePath: '/{{ telescope_path }}',
            wsUrl: (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws/telescope/',
        };
    </script>
    <script type="module" src="{% static 'telescope/assets/main.js' %}"></script>
</body>
</html>
